name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: patilu
                    POSTGRES_PASSWORD: patilu
                    POSTGRES_DB: patilu_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U patilu"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 5

        env:
            TEST_DATABASE_URL: postgresql://patilu:patilu@localhost:5432/patilu_test?schema=public
            DATABASE_URL: postgresql://patilu:patilu@localhost:5432/patilu_test?schema=public

        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache Bun dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: bun-${{ runner.os }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Generate Prisma client
              run: bunx prisma generate

            - name: Prepare test database
              run: bun run scripts/setup-test-db.ts

            - name: Lint
              run: bun run lint

            - name: Test
              run: bun test

    deploy:
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest

        concurrency:
            group: deploy-production
            cancel-in-progress: false

        env:
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /pack

        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache Bun dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
                  restore-keys: bun-${{ runner.os }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Apply migrations to Neon (idempotent)
              run: bunx prisma migrate deploy
              env:
                  DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

            - name: Cache Next build
              uses: actions/cache@v4
              with:
                  path: .next/cache
                  key: next-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.sha }}
                  restore-keys: next-${{ runner.os }}-${{ hashFiles('bun.lock') }}-

            - name: Build & deploy to Cloudflare
              run: bun run deploy
              env:
                  DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
